// ─── GIST SYNC ────────────────────────────────────────────────────────────────
const GIST_FILE = 'hm-plan-log.json';
const GIST_DESC = 'half-marathon-plan-workout-log';

const ghHdrs = tok => ({
  Authorization: `token ${tok}`,
  Accept: 'application/vnd.github.v3+json',
  'Content-Type': 'application/json',
});

async function gistFind(tok) {
  let page = 1;
  while (true) {
    const r = await fetch(`https://api.github.com/gists?per_page=100&page=${page}`, { headers: ghHdrs(tok) });
    if (!r.ok) throw new Error('auth_failed');
    const list = await r.json();
    const found = list.find(g => g.description === GIST_DESC);
    if (found) return found.id;
    if (list.length < 100) return null;
    page++;
  }
}

async function gistLoad(tok) {
  const id = await gistFind(tok);
  if (!id) return { gistId: null, logs: {} };
  const r = await fetch(`https://api.github.com/gists/${id}`, { headers: ghHdrs(tok) });
  const data = await r.json();
  const raw = data.files?.[GIST_FILE]?.content;
  return { gistId: id, logs: raw ? JSON.parse(raw) : {} };
}

async function gistSave(tok, gistId, logs) {
  const content = JSON.stringify(logs, null, 2);
  const files = { [GIST_FILE]: { content } };
  if (gistId) {
    await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH', headers: ghHdrs(tok), body: JSON.stringify({ files }),
    });
    return gistId;
  }
  const r = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: ghHdrs(tok),
    body: JSON.stringify({ description: GIST_DESC, public: false, files }),
  });
  const data = await r.json();
  return data.id;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function parseSetsCount(setsStr) {
  const m = setsStr.match(/^(\d+)/);
  return m ? parseInt(m[1]) : 3;
}

function calcSpeed(durStr, distKm) {
  if (!durStr || !distKm || isNaN(parseFloat(distKm))) return null;
  const parts = durStr.split(':').map(Number);
  let secs = 0;
  if (parts.length === 2) secs = parts[0] * 60 + parts[1];
  else if (parts.length === 3) secs = parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (!secs || isNaN(secs)) return null;
  return (parseFloat(distKm) / (secs / 3600)).toFixed(1);
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

const getCoaching = (type, desc) => {
  if (type === "off") return null;
  if (type === "race") return coaching.race;
  if (type === "long") return coaching.long;
  if (type === "cross") return coaching.cycling;
  if (type === "easy") {
    if (desc.toLowerCase().includes("stride")) return coaching.strides;
    return coaching.easy;
  }
  if (type === "quality") {
    if (desc.toLowerCase().includes("stride")) return coaching.strides;
    if (desc.toLowerCase().includes("km at") || desc.toLowerCase().includes("x 1") || desc.toLowerCase().includes("x 2") || desc.toLowerCase().includes("x 3")) return coaching.intervals;
    return coaching.tempo;
  }
  return coaching.easy;
};

// ─── LOG FORM HELPERS ─────────────────────────────────────────────────────────
function sessionExercises(session) {
  const desc = session.desc.toLowerCase();
  if (desc.includes('strength a')) return coaching.strengthA.exercises;
  if (session.type === 'cross') return coaching.strengthB.exercises;
  return [];
}

function isRunSession(type) {
  return ['easy', 'quality', 'long', 'race'].includes(type);
}

function isCyclingSession(type) {
  return type === 'cross';
}

function buildInitialStrength(exercises, existing) {
  const out = {};
  exercises.forEach(ex => {
    const count = parseSetsCount(ex.sets);
    out[ex.name] = existing?.[ex.name] || Array.from({ length: count }, () => ({ weight: '', reps: '' }));
  });
  return out;
}

// ─── LOG MODAL ────────────────────────────────────────────────────────────────
function LogModal({ weekNum, dayKey, session, existingLog, onSave, onClose }) {
  const exercises = sessionExercises(session);
  const showRun = isRunSession(session.type);
  const showCycling = isCyclingSession(session.type);
  const showStrength = exercises.length > 0;

  const [run, setRun] = useState(existingLog?.run || { duration: '', distanceKm: '', notes: '' });
  const [cycling, setCycling] = useState(existingLog?.cycling || { duration: '', distanceKm: '' });
  const [strength, setStrength] = useState(() => buildInitialStrength(exercises, existingLog?.strength));

  const runSpeed = calcSpeed(run.duration, run.distanceKm);
  const cycleSpeed = calcSpeed(cycling.duration, cycling.distanceKm);

  function updateSet(exName, idx, field, val) {
    setStrength(prev => {
      const sets = [...(prev[exName] || [])];
      sets[idx] = { ...sets[idx], [field]: val };
      return { ...prev, [exName]: sets };
    });
  }

  function handleSave() {
    const log = {
      type: session.type,
      date: new Date().toISOString().slice(0, 10),
      completedAt: Date.now(),
    };
    if (showRun)      log.run = { ...run, avgSpeedKmh: runSpeed };
    if (showCycling)  log.cycling = { ...cycling, avgSpeedKmh: cycleSpeed };
    if (showStrength) log.strength = strength;
    onSave(log);
  }

  const inputStyle = { background:"#141414", border:"1px solid #2a2a2a", color:"#e5e5e5",
    borderRadius:4, padding:"9px 10px", fontSize:14, width:"100%",
    fontFamily:"'Courier New', monospace", outline:"none" };
  const labelStyle = { fontSize:9, letterSpacing:2, color:"#3a3a3a", display:"block", marginBottom:5 };
  const sectionStyle = { marginBottom:20, paddingBottom:20, borderBottom:"1px solid #1a1a1a" };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20}}>
          <div>
            <div style={{fontSize:9, letterSpacing:3, color:"#555"}}>LOG SESSION</div>
            <div style={{fontSize:13, color:"#ccc", marginTop:3}}>Week {weekNum} — {dayKey.split('-')[1].toUpperCase()}</div>
          </div>
          <button onClick={onClose} style={{background:"none", border:"1px solid #222", color:"#555",
            padding:"6px 12px", fontSize:11, letterSpacing:1}}>CANCEL</button>
        </div>

        {showRun && (
          <div style={sectionStyle}>
            <div style={{fontSize:10, letterSpacing:3, color:"#4ade80", marginBottom:14}}>RUN</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10}}>
              <div>
                <label style={labelStyle}>DISTANCE (km)</label>
                <input style={inputStyle} type="number" inputMode="decimal" placeholder="8.5"
                  value={run.distanceKm} onChange={e => setRun(r => ({...r, distanceKm: e.target.value}))} />
              </div>
              <div>
                <label style={labelStyle}>DURATION (mm:ss)</label>
                <input style={inputStyle} type="text" placeholder="45:30"
                  value={run.duration} onChange={e => setRun(r => ({...r, duration: e.target.value}))} />
              </div>
            </div>
            {runSpeed && (
              <div style={{fontSize:11, color:"#4ade8077", letterSpacing:1, marginBottom:10}}>
                AVG SPEED: {runSpeed} km/h
              </div>
            )}
            <div>
              <label style={labelStyle}>NOTES (optional)</label>
              <textarea style={{...inputStyle, minHeight:64, resize:"vertical"}} placeholder="How did it feel?"
                value={run.notes} onChange={e => setRun(r => ({...r, notes: e.target.value}))} />
            </div>
          </div>
        )}

        {showCycling && (
          <div style={sectionStyle}>
            <div style={{fontSize:10, letterSpacing:3, color:"#60a5fa", marginBottom:14}}>CYCLING</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              <div>
                <label style={labelStyle}>DISTANCE (km)</label>
                <input style={inputStyle} type="number" inputMode="decimal" placeholder="12"
                  value={cycling.distanceKm} onChange={e => setCycling(c => ({...c, distanceKm: e.target.value}))} />
              </div>
              <div>
                <label style={labelStyle}>DURATION (mm:ss)</label>
                <input style={inputStyle} type="text" placeholder="35:00"
                  value={cycling.duration} onChange={e => setCycling(c => ({...c, duration: e.target.value}))} />
              </div>
            </div>
            {cycleSpeed && (
              <div style={{fontSize:11, color:"#60a5fa77", letterSpacing:1, marginTop:10}}>
                AVG SPEED: {cycleSpeed} km/h
              </div>
            )}
          </div>
        )}

        {showStrength && (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10, letterSpacing:3, color:"#60a5fa", marginBottom:14}}>STRENGTH</div>
            {exercises.map((ex, ei) => (
              <div key={ei} style={{marginBottom:18}}>
                <div style={{fontSize:12, color:"#e5e5e5", fontWeight:700, marginBottom:2}}>{ex.name}</div>
                <div style={{fontSize:10, color:"#60a5fa88", letterSpacing:1, marginBottom:8}}>{ex.sets}</div>
                {(strength[ex.name] || []).map((set, si) => (
                  <div key={si} style={{display:"grid", gridTemplateColumns:"auto 1fr 1fr", gap:8, marginBottom:6, alignItems:"center"}}>
                    <div style={{fontSize:9, color:"#333", letterSpacing:1, minWidth:36}}>SET {si+1}</div>

                      <input style={inputStyle} type="number" inputMode="decimal" placeholder="kg"

          onClick={handleSave}

          SAVE SESSION
        </button>
      </div>
    </div>
  );
}

  const entries = [];
  plan.forEach(w => {
    days.forEach(d => {
      const key = logKey(w.week, d);
      if (logs[key]) {
        entries.push({ key, week: w.week, phase: w.phase, day: d, session: w[d], log: logs[key] });
      }

  entries.reverse();

  if (entries.length === 0) {
    return (
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>

// ─── TOKEN SETUP MODAL ────────────────────────────────────────────────────────
function SetupModal({ onSave, onSkip }) {
  const [val, setVal] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleConnect() {
    if (!val.trim()) return;
    setLoading(true);
    setErr('');
    try {
      const r = await fetch('https://api.github.com/gists?per_page=1', {
        headers: ghHdrs(val.trim()),
      });
      if (!r.ok) throw new Error();
      onSave(val.trim());
    } catch {
      setErr('Token invalid or no gist access. Check the token has "gist" scope.');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="modal-overlay">
      <div className="modal-sheet">
        <div style={{fontSize:10, letterSpacing:3, color:"#555", marginBottom:6}}>SYNC SETUP</div>
        <div style={{fontSize:16, color:"#e5e5e5", fontWeight:700, marginBottom:16}}>Connect GitHub Gist</div>
        <div style={{fontSize:13, color:"#666", lineHeight:1.7, marginBottom:20}}>
          Your workout logs will sync across devices via a private GitHub Gist.{"\n\n"}
          To set up:{"\n"}
          1. Go to <span style={{color:"#60a5fa"}}>github.com/settings/tokens</span>{"\n"}
          2. Generate a classic token with only the <span style={{color:"#4ade80"}}>gist</span> scope checked{"\n"}
          3. Paste it below
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:9, letterSpacing:2, color:"#3a3a3a", display:"block", marginBottom:5}}>
            GITHUB TOKEN (ghp_…)
          </label>
          <input
            type="password"
            placeholder="ghp_xxxxxxxxxxxx"
            value={val}
            onChange={e => setVal(e.target.value)}
            style={{background:"#141414", border:"1px solid #2a2a2a", color:"#e5e5e5",
              borderRadius:4, padding:"9px 10px", fontSize:14, width:"100%",
              fontFamily:"'Courier New', monospace", outline:"none"}}
          />
        </div>
        {err && <div style={{fontSize:11, color:"#f87171", marginBottom:12}}>{err}</div>}
        <button
          onClick={handleConnect}
          disabled={loading || !val.trim()}
          style={{width:"100%", padding:"13px", background:"#1a1a1a", border:"1px solid #333",
            color: loading ? "#444" : "#e5e5e5", fontSize:11, letterSpacing:3,
            fontFamily:"'Courier New', monospace", marginBottom:10}}>
          {loading ? "CONNECTING…" : "CONNECT"}
        </button>
        <button
          onClick={onSkip}
          style={{width:"100%", padding:"10px", background:"transparent", border:"none",
            color:"#333", fontSize:10, letterSpacing:2, fontFamily:"'Courier New', monospace"}}>
          SKIP — use without sync
        </button>
      </div>
    </div>
  );
}

  const [showSetup,   setShowSetup]   = useState(() => !localStorage.getItem('hm_gh_token'));
  const [logs,        setLogs]        = useState({});
  const [gistId,      setGistId]      = useState(() => localStorage.getItem('hm_gist_id') || null);
  const [syncStatus,  setSyncStatus]  = useState('idle'); // idle | syncing | saved | error
  const [openWeek,    setOpenWeek]    = useState(null);
  const [openDay,     setOpenDay]     = useState(null);
  const [phaseFilter, setPhaseFilter] = useState(null);
  const [showStrength,setShowStrength]= useState(null);
  const [logModal,    setLogModal]    = useState(null); // { week, day }
  const [showHistory, setShowHistory] = useState(false);

  // Load logs from Gist on mount / when token changes
  useEffect(() => {
    if (!token) return;
    setSyncStatus('syncing');
    gistLoad(token)
      .then(({ gistId: id, logs: data }) => {
        if (id) {
          setGistId(id);
          localStorage.setItem('hm_gist_id', id);
        }
        setLogs(data);
        setSyncStatus('idle');
      })
      .catch(() => setSyncStatus('error'));
  }, [token]);

  // Sync to Gist after any log change
  const syncRef = useRef(null);
  function scheduleSave(newLogs) {
    clearTimeout(syncRef.current);
    syncRef.current = setTimeout(async () => {
      if (!token) return;
      setSyncStatus('syncing');
      try {
        const newId = await gistSave(token, gistId, newLogs);
        if (newId !== gistId) {
          setGistId(newId);
          localStorage.setItem('hm_gist_id', newId);
        }
        setSyncStatus('saved');
        setTimeout(() => setSyncStatus('idle'), 1800);
      } catch {
        setSyncStatus('error');
      }
    }, 800);
  }

  function saveLog(week, day, logEntry) {
    const key = logKey(week, day);
    const updated = { ...logs, [key]: logEntry };
    setLogs(updated);
    setLogModal(null);
    scheduleSave(updated);
  }

  function handleTokenSave(tok) {
    localStorage.setItem('hm_gh_token', tok);
    setToken(tok);
    setShowSetup(false);
  }

  const visible = phaseFilter ? plan.filter(w => w.phase === phaseFilter) : plan;
  const loggedCount = Object.keys(logs).length;

  const syncColor = syncStatus === 'saved' ? '#4ade80' : syncStatus === 'error' ? '#f87171' : '#333';
  const syncLabel = syncStatus === 'syncing' ? 'SYNCING…' : syncStatus === 'saved' ? 'SAVED' : syncStatus === 'error' ? 'SYNC ERROR' : '';

  return (
    <div className="app-shell">

      {/* Sync status bar */}
      {syncLabel && (
        <div className="sync-bar" style={{color: syncColor, background:"#0a0a0a88"}}>{syncLabel}</div>
      )}

      {/* Setup modal */}
      {showSetup && (
        <SetupModal
          onSave={handleTokenSave}
          onSkip={() => setShowSetup(false)}
        />
      )}

      {/* Log modal */}
      {logModal && (() => {
        const w = plan.find(w => w.week === logModal.week);
        const session = w[logModal.day];
        return (
          <LogModal
            weekNum={logModal.week}
            dayKey={logKey(logModal.week, logModal.day)}
            session={session}
            existingLog={logs[logKey(logModal.week, logModal.day)]}
            onSave={entry => saveLog(logModal.week, logModal.day, entry)}
            onClose={() => setLogModal(null)}
          />
        );
      })()}

      {/* History modal */}
      {showHistory && <LogHistory logs={logs} onClose={() => setShowHistory(false)} />}

      <div style={{minHeight:"100vh", background:"#0a0a0a", color:"#e5e5e5",
        fontFamily:"'Courier New', monospace", padding:"24px 16px", maxWidth:860, margin:"0 auto"}}>

        {/* Header */}
        <div style={{marginBottom:36}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
            <div style={{fontSize:10, letterSpacing:6, color:"#333", marginBottom:8}}>17-WEEK TRAINING PLAN</div>
            <div style={{display:"flex", gap:8}}>
              {loggedCount > 0 && (
                <button onClick={() => setShowHistory(true)}
                  style={{background:"transparent", border:"1px solid #1a1a1a", color:"#555",
                    fontSize:9, letterSpacing:2, padding:"5px 10px", fontFamily:"'Courier New', monospace"}}>
                  LOG ({loggedCount})
                </button>
              )}
              <button onClick={() => setShowSetup(true)}
                style={{background:"transparent", border:"1px solid #1a1a1a", color:"#333",
                  fontSize:9, letterSpacing:2, padding:"5px 10px", fontFamily:"'Courier New', monospace"}}>
                {token ? "SYNC" : "SETUP"}
              </button>
            </div>
          </div>
          <h1 style={{fontSize:"clamp(28px,7vw,50px)", fontWeight:900, letterSpacing:-2, margin:0, lineHeight:1, fontFamily:"'Georgia', serif"}}>
            HALF MARATHON
          </h1>
          <div style={{display:"flex", gap:20, marginTop:14, flexWrap:"wrap"}}>
            {[["TARGET","Sub-2:00"],["RACE PACE","5:41 / km"],["EASY PACE","6:45–7:15 / km"],["RACE DATE","Late August 2026"]].map(([k,v]) => (
              <div key={k}>
                <div style={{fontSize:9, letterSpacing:3, color:"#3a3a3a"}}>{k}</div>
                <div style={{fontSize:14, fontWeight:700, color:"#e5e5e5"}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14, padding:"10px 12px", background:"#0d0d0d",
            border:"1px solid #1e1e1e", fontSize:11, color:"#444", lineHeight:1.8}}>
            MON easy &nbsp;·&nbsp; TUE easy + Str A &nbsp;·&nbsp; WED off &nbsp;·&nbsp; THU quality &nbsp;·&nbsp; FRI cycling + Str B &nbsp;·&nbsp; SAT long &nbsp;·&nbsp; SUN off
          </div>
        </div>

        {/* Phase filter */}
        <div style={{display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:6, marginBottom:24}}>
          {phases.map(p => (
            <div key={p.id} onClick={() => setPhaseFilter(phaseFilter===p.id ? null : p.id)}
              style={{padding:"12px", border:`1px solid ${phaseFilter===p.id ? phaseColors[p.id] : "#1e1e1e"}`,
                background:phaseFilter===p.id ? phaseColors[p.id]+"11" : "#0c0c0c", cursor:"pointer"}}>
              <div style={{fontSize:9, letterSpacing:3, color:phaseColors[p.id]}}>{p.name} — WK {p.weeks}</div>
              <div style={{fontSize:11, color:"#555", marginTop:4, lineHeight:1.5}}>{p.desc}</div>
            </div>
          ))}
        </div>
        {phaseFilter && (
          <div style={{fontSize:11, color:"#444", marginBottom:12, letterSpacing:1}}>
            Showing {phaseNames[phaseFilter]} only —{" "}
            <span onClick={() => setPhaseFilter(null)} style={{color:"#777", cursor:"pointer", textDecoration:"underline"}}>show all</span>
          </div>
        )}

        {/* Week list */}
        <div style={{display:"flex", flexDirection:"column", gap:3, marginBottom:40}}>
          {visible.map(w => {
            const pc = phaseColors[w.phase];
            const isOpen = openWeek === w.week;
            const weekLogCount = days.filter(d => logs[logKey(w.week, d)]).length;
            return (
              <div key={w.week} style={{border:`1px solid ${isOpen ? pc+"44" : "#161616"}`, background:"#0c0c0c"}}>
                <div onClick={() => { setOpenWeek(isOpen ? null : w.week); setOpenDay(null); }}
                  style={{display:"flex", alignItems:"center", gap:10, padding:"13px 14px", cursor:"pointer"}}>
                  <div style={{fontSize:9, letterSpacing:3, color:pc, minWidth:76}}>{phaseNames[w.phase]} W{w.week}</div>
                  {w.cutback && <div style={{fontSize:8, letterSpacing:2, color:"#444", border:"1px solid #222", padding:"1px 5px", flexShrink:0}}>CUT</div>}
                  {weekLogCount > 0 && <div style={{fontSize:8, color:pc+"99", flexShrink:0}}>✓{weekLogCount}</div>}
                  <div style={{flex:1, display:"flex", gap:2}}>
                    {days.map(d => {
                      const logged = !!logs[logKey(w.week, d)];
                      return (
                        <div key={d} style={{flex:1, height:5,
                          background: logged ? typeStyles[w[d].type].border : typeStyles[w[d].type].border,
                          opacity: w[d].type==="off" ? 0.08 : logged ? 1 : 0.35,
                          outline: logged ? `1px solid ${typeStyles[w[d].type].border}` : 'none',
                        }} />
                      );
                    })}
                  </div>
                  <div style={{fontSize:11, color:"#3a3a3a", minWidth:44, textAlign:"right"}}>{w.totalKm} km</div>
                  <div style={{fontSize:10, color:"#3a3a3a", marginLeft:2}}>{isOpen ? "▲" : "▼"}</div>
                </div>

                {isOpen && (
                  <div style={{borderTop:"1px solid #141414"}}>
                    {days.map((d, i) => {
                      const session = w[d];
                      const s = typeStyles[session.type];
                      const isOff = session.type === "off";
                      const key = `${w.week}-${d}`;
                      const isDayOpen = openDay === key;
                      const coachData = getCoaching(session.type, session.desc);
                      const showStrA = session.desc.toLowerCase().includes("strength a");
                      const isLogged = !!logs[logKey(w.week, d)];

                      return (
                        <div key={d} style={{borderTop:"1px solid #111"}}>
                          <div onClick={() => !isOff && setOpenDay(isDayOpen ? null : key)}
                            style={{display:"flex", gap:12, padding:"13px 14px",
                              cursor:isOff?"default":"pointer",
                              background:isDayOpen?"#101010":"transparent"}}>
                            <div style={{fontSize:9, letterSpacing:2, color:"#333", minWidth:28, paddingTop:1}}>{dayLabels[i]}</div>
                            <div style={{width:2, background:s.border, opacity:isOff?0.15:0.75, flexShrink:0, borderRadius:1}} />
                            <div style={{flex:1}}>
                              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:3}}>
                                <div style={{fontSize:10, color:s.labelColor, letterSpacing:2}}>{s.label}</div>
                                {isLogged && <div style={{fontSize:8, color:s.labelColor+"99", letterSpacing:1}}>✓ LOGGED</div>}
                              </div>
                              <div style={{fontSize:13, color:isOff?"#2a2a2a":"#ccc", lineHeight:1.5}}>{session.desc}</div>
                              {!isOff && <div style={{fontSize:10, color:"#333", marginTop:5, letterSpacing:1}}>{isDayOpen?"▲ hide notes":"▼ coaching notes"}</div>}
                            </div>
                          </div>

                          {isDayOpen && (
                            <div style={{padding:"0 14px 16px 14px"}}>
                              {coachData && <CoachingPanel data={coachData} />}
                              {showStrA   && <div style={{marginTop:8}}><CoachingPanel data={coaching.strengthA} /></div>}
                              {session.type === "cross" && <div style={{marginTop:8}}><CoachingPanel data={coaching.strengthB} /></div>}

                              {/* Log button */}
                              <button
                                onClick={() => setLogModal({ week: w.week, day: d })}
                                style={{
                                  marginTop:12, width:"100%", padding:"11px",
                                  background: isLogged ? "#0d1a0d" : "#111",
                                  border: `1px solid ${isLogged ? s.border+"44" : "#222"}`,
                                  color: isLogged ? s.labelColor : "#555",
                                  fontSize:10, letterSpacing:3,
                                  fontFamily:"'Courier New', monospace",
                                }}>
                                {isLogged ? "✓ EDIT LOG" : "LOG THIS SESSION"}
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Strength reference */}
        <div style={{borderTop:"1px solid #1a1a1a", paddingTop:24, marginBottom:8}}>
          <div style={{fontSize:10, letterSpacing:4, color:"#333", marginBottom:14}}>STRENGTH REFERENCE</div>
          <div style={{display:"flex", gap:8, marginBottom:16}}>
            {["A","B"].map(l => (
              <button key={l} onClick={() => setShowStrength(showStrength===l?null:l)}
                style={{padding:"10px 20px", border:`1px solid ${showStrength===l?"#60a5fa":"#222"}`,
                  background:showStrength===l?"#60a5fa11":"transparent",
                  color:showStrength===l?"#60a5fa":"#555",
                  fontSize:10, letterSpacing:3, fontFamily:"'Courier New', monospace"}}>
                SESSION {l}
              </button>
            ))}
          </div>
          {showStrength==="A" && <CoachingPanel data={coaching.strengthA} />}
          {showStrength==="B" && <CoachingPanel data={coaching.strengthB} />}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
